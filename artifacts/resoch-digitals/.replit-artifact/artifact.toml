kind = "web"
previewPath = "/"
title = "Re.Soch Digitals"
version = "1.0.0"
id = "artifacts/resoch-digitals"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21716

[services.development]
run = "pnpm --filter @workspace/resoch-digitals run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/resoch-digitals", "run", "build" ]
publicDir = "artifacts/resoch-digitals/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21716"
BASE_PATH = "/"
